<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ikeh Ikeh Doors</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{
  --gold:#d4af37;
}

/* HERO */
.hero{
  width:100%;
  height:320px;
  background:url('https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/9fa2858be11307f390e137948ab9a366568fd4c7/.github/workflows/1772529239762.png') center/cover no-repeat;
  border-bottom:4px solid var(--gold);
}

/* INFO */
.info-section{
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
  text-align:center;
}
.info-section h2{color:var(--gold);}

/* MOVING GALLERY */
.slider{
  overflow:hidden;
  max-width:1100px;
  margin:30px auto;
  border-top:1px solid rgba(212,175,55,.4);
  border-bottom:1px solid rgba(212,175,55,.4);
}
.track{
  display:flex;
  width:max-content;
  animation:moveLeft 35s linear infinite;
}
.track.reverse{
  animation:moveRight 35s linear infinite;
}
.track img{
  width:260px;
  height:220px;
  object-fit:cover;
  margin:10px;
  border:2px solid rgba(212,175,55,.6);
  border-radius:6px;
  box-shadow:0 0 12px rgba(212,175,55,.25);
}

/* ANIMATIONS */
@keyframes moveLeft{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}
@keyframes moveRight{
  from{transform:translateX(-50%);}
  to{transform:translateX(0);}
}

/* FORM */
.form-box{
  max-width:750px;
  margin:50px auto;
  padding:30px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{color:var(--gold);text-align:center;}
label{display:block;margin-top:15px;}
input,select,textarea{
  width:100%;
  padding:12px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}
button{
  width:100%;
  margin-top:25px;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:18px;
  font-weight:800;
}

/* MAP */
.map-box iframe{
  width:100%;
  height:350px;
  border:2px solid rgba(212,175,55,.4);
}

/* FLOATING BUTTONS */
.whatsapp-btn,.call-btn{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp-btn{bottom:90px;background:#25d366;}
.call-btn{bottom:30px;background:#2563eb;}

footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:#aaa;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="info-section">
<h2>High Quality Doors & Installation</h2>
<p>Security doors, Turkey doors, panel doors, stainless doors, glass doors and professional installation.</p>
</div>

<!-- SLIDER LEFT -->
<div class="slider">
  <div class="track">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0031.jpg">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0032.jpg">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0033.jpg">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0034.jpg">
  </div>
</div>

<!-- SLIDER RIGHT -->
<div class="slider">
  <div class="track reverse">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0035.jpg">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0036.jpg">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0037.jpg">
    <img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0038.jpg">
  </div>
</div>

<!-- MAP -->
<div class="map-box">
<iframe src="https://www.google.com/maps?q=Ultra+Modern+Market+Asaba+Delta+State&output=embed"></iframe>
</div>

<!-- FORM -->
<div class="form-box">
<h2>Booking & Order Form</h2>
<form onsubmit="sendToWhatsApp();return false;">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<select id="door">
<option>Security Door</option>
<option>Turkey Door</option>
<option>Panel Door</option>
<option>Glass Door</option>
</select>
<select id="delivery"><option>Delivery: Yes</option><option>No Delivery</option></select>
<select id="install"><option>Installation: Yes</option><option>No Installation</option></select>
<button>Submit via WhatsApp</button>
</form>
</div>

<footer>© 2026 Ikeh Ikeh Doors</footer>

<a class="whatsapp-btn" href="https://wa.me/2349038800388">WhatsApp</a>
<a class="call-btn" href="tel:08111539390">Call</a>

<script>
function sendToWhatsApp(){
const msg=`Name:${name.value}%0APhone:${phone.value}%0ADoor:${door.value}`;
window.open("https://wa.me/2349038800388?text="+msg,"_blank");
}
</script>

</body>
</html>
