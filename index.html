<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ikeh Ikeh Doors</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HERO */
.hero{
  width:100%;
  height:320px;
  background:url('https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/9fa2858be11307f390e137948ab9a366568fd4c7/.github/workflows/1772529239762.png') center/cover no-repeat;
  border-bottom:4px solid var(--gold);
}

/* INFO */
.info{
  text-align:center;
  padding:30px 20px;
}
.info h2{color:var(--gold)}

/* STATIC GALLERY */
.gallery{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
  border:2px solid rgba(212,175,55,.6);
  box-shadow:0 0 12px rgba(212,175,55,.25);
}

/* MOVING TWO IMAGES */
.moving-wrap{
  overflow:hidden;
  max-width:1100px;
  margin:40px auto;
  border-top:1px solid rgba(212,175,55,.4);
  border-bottom:1px solid rgba(212,175,55,.4);
}
.moving-track{
  display:flex;
  width:fit-content;
  animation:slide 18s ease-in-out infinite alternate;
}
.moving-track img{
  width:50vw;
  max-width:520px;
  height:260px;
  object-fit:cover;
  margin:10px;
  border:2px solid var(--gold);
}
@keyframes slide{
  from{transform:translateX(0)}
  to{transform:translateX(-40%)}
}

/* FORM */
.form-box{
  max-width:750px;
  margin:50px auto;
  padding:30px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{color:var(--gold);text-align:center}
label{display:block;margin-top:15px}
input,select{
  width:100%;
  padding:12px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}
button{
  margin-top:25px;
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:18px;
  font-weight:800;
}

/* MAP */
.map iframe{
  width:100%;
  height:350px;
  border:2px solid rgba(212,175,55,.4);
}

/* FLOATING BUTTONS */
.whatsapp,.call{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:30px;background:#2563eb}

footer{
  background:#000;
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="info">
<h2>High Quality Doors & Installation</h2>
<p>Security doors, Turkey doors, panel doors, stainless doors, glass doors and professional installation.</p>
</div>

<!-- STATIC IMAGES -->
<div class="gallery">
<img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0031.jpg">
<img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0032.jpg">
<img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0033.jpg">
<img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0034.jpg">
</div>

<!-- ONLY TWO MOVING -->
<div class="moving-wrap">
<div class="moving-track">
<img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0035.jpg">
<img src="https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/c8cc3ec9be3e6d818bc15545463c84549b80dcaf/.github/workflows/IMG-20260121-WA0036.jpg">
</div>
</div>

<!-- MAP -->
<div class="map">
<iframe src="https://www.google.com/maps?q=Ultra+Modern+Market+Asaba+Delta+State&output=embed"></iframe>
</div>

<!-- FORM -->
<div class="form-box">
<h2>Booking & Order Form</h2>
<form onsubmit="send();return false;">
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<select id="door">
<option>Security Door</option>
<option>Turkey Door</option>
<option>Panel Door</option>
<option>Glass Door</option>
</select>
<select id="delivery">
<option>Delivery Required</option>
<option>No Delivery</option>
</select>
<select id="install">
<option>Installation Required</option>
<option>No Installation</option>
</select>
<button>Submit via WhatsApp</button>
</form>
</div>

<footer>© 2026 Ikeh Ikeh Doors</footer>

<a class="whatsapp" href="https://wa.me/2349038800388">WhatsApp</a>
<a class="call" href="tel:08111539390">Call</a>

<script>
function send(){
const msg=`Name:${name.value}%0APhone:${phone.value}%0ADoor:${door.value}%0ADelivery:${delivery.value}%0AInstallation:${install.value}`;
window.open("https://wa.me/2349038800388?text="+msg,"_blank");
}
</script>

</body>
</html>
