<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ikeh Ikeh Doors</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HERO */
.hero{
  width:100%;
  height:320px;
  background:url('https://raw.githubusercontent.com/allroundadvert/IKEH-IKEH-DOORS-/9fa2858be11307f390e137948ab9a366568fd4c7/.github/workflows/1772529239762.png') center/cover no-repeat;
  border-bottom:4px solid var(--gold);
}

/* INFO */
.info{
  text-align:center;
  padding:30px 20px;
}
.info h2{color:var(--gold)}

/* STATIC GALLERY */
.gallery{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
  border:2px solid rgba(212,175,55,.6);
  box-shadow:0 0 12px rgba(212,175,55,.25);
}

/* MOVING TWO IMAGES */
.moving-wrap{
  overflow:hidden;
  max-width:1100px;
  margin:40px auto;
  border-top:1px solid rgba(212,175,55,.4);
  border-bottom:1px solid rgba(212,175,55,.4);
}
.moving-track{
  display:flex;
  animation:slide 18s ease-in-out infinite alternate;
}
.moving-track img{
  width:50vw;
  max-width:520px;
  height:260px;
  object-fit:cover;
  margin:10px;
  border:2px solid var(--gold);
}
@keyframes slide{
  from{transform:translateX(0)}
  to{transform:translateX(-40%)}
}

/* FORM */
.form-box{
  max-width:750px;
  margin:50px auto;
  padding:30px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{
  color:var(--gold);
  text-align:center;
  margin-bottom:15px;
}
label{
  display:block;
  margin-top:15px;
  font-weight:600;
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}
textarea{
  min-height:100px;
  resize:vertical;
}
button{
  margin-top:25px;
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

/* MAP */
.map iframe{
  width:100%;
  height:350px;
  border:2px solid rgba(212,175,55,.4);
}

/* FLOATING BUTTONS */
.whatsapp,.call{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:30px;background:#2563eb}

footer{
  background:#000;
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="info">

<div class="form-box">
<h2>Booking & Order Form</h2>
<form onsubmit="send();return false;">

<label>Customer Name</label>
<input id="name" placeholder="Full Name">

<label>Phone Number</label>
<input id="phone" placeholder="Phone Number">

<label>Door Type</label>
<select id="door">
<option>Security Door</option>
<option>Turkey Door</option>
<option>Panel Door</option>
<option>Stainless Door</option>
<option>Glass Door</option>
<option>Other</option>
</select>

<label>Specifications</label>
<textarea id="specs" placeholder="Size, color, design preference, special request, etc"></textarea>

<label>Delivery</label>
<select id="delivery">
<option>Yes, I want delivery</option>
<option>No delivery</option>
</select>

<label>Installation</label>
<select id="install">
<option>Yes, installation needed</option>
<option>No installation</option>
</select>

<button>Submit via WhatsApp</button>
</form>

<footer>© 2026 Ikeh Ikeh Doors</footer>

<a class="whatsapp" href="https://wa.me/2349038800388">WhatsApp</a>
<a class="call" href="tel:08111539390">Call</a>

<script>
function send(){
const msg =
`Name: ${name.value}%0A
Phone: ${phone.value}%0A
Door: ${door.value}%0A
Specifications: ${specs.value}%0A
Delivery: ${delivery.value}%0A
Installation: ${install.value}`;
window.open("https://wa.me/2349038800388?text="+msg,"_blank");
}
</script>
